name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Until soothe-sdk 1.0.2 is on PyPI (CoreAgent protocols), install from monorepo.
  SOOTHE_SDK_GIT: https://github.com/mirasoth/soothe.git
  SOOTHE_SDK_REF: feat/nano-agent
  UV_RUN: uv run --no-sync

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: make sync-dev

      - name: Install soothe-sdk with CoreAgent protocols
        run: |
          if curl -sf "https://pypi.org/pypi/soothe-sdk/1.0.2/json" >/dev/null; then
            echo "soothe-sdk 1.0.2 on PyPI — re-sync from index"
            uv sync --extra dev
          else
            echo "Installing soothe-sdk from ${SOOTHE_SDK_GIT}@${SOOTHE_SDK_REF}"
            uv pip install --force-reinstall \
              "soothe-sdk @ git+${SOOTHE_SDK_GIT}@${SOOTHE_SDK_REF}#subdirectory=packages/soothe-sdk"
          fi
          ${{ env.UV_RUN }} python -c "from soothe_sdk.protocols.core_agent import CoreAgentCapabilities; print('soothe-sdk protocols OK')"

      - name: Format check
        run: make format-check

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test-unit

      - name: Coverage
        if: matrix.python-version == '3.12'
        run: |
          ${{ env.UV_RUN }} pytest tests/unit/ --cov=soothe_nano --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: make sync-dev

      - name: Build package
        run: make build

      - name: Verify package
        run: |
          uv run --no-sync twine check dist/*
          echo "Package built and verified"
